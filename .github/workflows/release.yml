name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag，随便填个版本号"
        required: true

jobs:
##############################################################################
# 1) 先编译本项目的本地 native 库 (libcore) 并缓存 .aar
##############################################################################
  libcore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # (1) 安装 NDK r25c —— 用别名 r25c 避免 404:contentReference[oaicite:0]{index=0}:contentReference[oaicite:1]{index=1}:contentReference[oaicite:2]{index=2}
      - name: Setup NDK r25c
        id: ndk
        uses: nttld/setup-ndk@v1
        with: { ndk-version: "r25c" }

      # (2) Golang 环境 & 构建 libcore
      - uses: actions/setup-go@v5
        with: { go-version: ^1.24 }
      - run: ./run lib core

##############################################################################
# 2) 编译 APK（OSS 版）
##############################################################################
  build:
    runs-on: ubuntu-latest
    needs: libcore
    steps:
      - uses: actions/checkout@v4

      # 同样安装 NDK r25c
      - name: Setup NDK r25c
        id: ndk
        uses: nttld/setup-ndk@v1
        with: { ndk-version: "r25c" }

      # —— 防守护进程 OOM：先杀旧 daemon，再写 gradle.properties ——:contentReference[oaicite:3]{index=3}:contentReference[oaicite:4]{index=4}:contentReference[oaicite:5]{index=5}
      - name: Kill old Gradle daemons
        run: rm -rf ~/.gradle/daemon

      - name: Inject gradle.properties
        run: |
          cat > gradle.properties <<'EOF'
          org.gradle.daemon=false
          org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8
          org.gradle.unsafe.configuration-cache=false
          EOF

      # 构建 APK，显示完整路径
      - name: Assemble OSS APK
        env:
          JAVA_TOOL_OPTIONS: "-Xmx2g"
          GRADLE_OPTS: "-Xmx2g -Dkotlin.daemon.jvm.options=-Xmx1g"
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "ndk.dir=${{ steps.ndk.outputs.ndk-path }}" >> local.properties
          ./run init action gradle
          ./gradlew --no-daemon --no-configuration-cache app:assembleOssRelease
          find app/build/outputs -name '*.apk' -print

      # 输出构建产物
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: app/build/outputs/apk/**/app-*.apk

##############################################################################
# 3) （可选）发布 GitHub Release，如果不需要可删掉这个 job
##############################################################################
  publish:
    if: false   # 默认为 false，不自动发 Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: APK, path: artifacts }
      - run: |
          wget -qO- https://github.com/tcnksm/ghr/releases/download/v0.13.0/ghr_v0.13.0_linux_amd64.tar.gz | tar xz
          ./ghr_v0.13.0_linux_amd64/ghr -t "${{ github.token }}" "${{ github.event.inputs.tag }}" artifacts
